name: enriched_orders
description: Cleaned orders unnested with customer details attached.

config:
  materialized: table

base_entity:
  schema: raw_stripe
  table: payments

relationships:
  customer:
    to_model: core.customers
    match_on: user_id

transformations:
  - type: unnest
    source_array: properties.events
    alias: event_data

  - type: pivot
    on_column: event_data.event_name
    values: ['login', 'purchase']
    aggregate: count

columns:
  - name: user_id
    source_column: id
    is_primary_key: true
    type: string

  - name: customer_email
    pull_from_relationship: customer
    target_column: email

  - name: total_logins
    source_column: login

  - name: first_active_date
    transformation: first_occurrence
    source_column: created_at
    partition_by: [user_id]

filters:
  - column: status
    operator: equals
    value: active
